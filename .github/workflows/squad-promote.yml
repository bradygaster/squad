name: Squad Promote

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would happen without pushing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  dev-to-insider:
    name: Promote dev → insider
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state (dry run info)
        run: |
          echo "=== dev HEAD ===" && git log origin/dev -1 --oneline
          echo "=== insider HEAD ===" && git log origin/insider -1 --oneline
          echo "=== Files that would be stripped ==="
          git diff origin/insider..origin/dev --name-only | grep -E "^(\.(ai-team|squad|ai-team-templates)|team-docs/|docs/proposals/)" || echo "(none)"

      - name: Merge dev → insider (strip forbidden paths)
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git checkout insider
          git merge origin/dev --no-commit --no-ff -X theirs || true

          # Strip forbidden paths from merge commit
          git rm -rf --cached --ignore-unmatch \
            .ai-team/ \
            .squad/ \
            .ai-team-templates/ \
            team-docs/ \
            "docs/proposals/" || true

          # Commit if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: promote dev → insider (v$(node -e "console.log(require('./package.json').version)"))"
            git push origin insider
            echo "✅ Pushed insider branch"
          else
            echo "ℹ️ Nothing to commit — insider is already up to date"
          fi

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."

  insider-to-main:
    name: Promote insider → main (release)
    needs: dev-to-insider
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state
        run: |
          echo "=== insider HEAD ===" && git log origin/insider -1 --oneline
          echo "=== main HEAD ===" && git log origin/main -1 --oneline
          echo "=== Version ===" && node -e "console.log('v' + require('./package.json').version)"

      - name: Validate insider is release-ready
        run: |
          git checkout insider
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md 2>/dev/null; then
            echo "::error::Version $VERSION not found in CHANGELOG.md — update before releasing"
            exit 1
          fi
          echo "✅ Version $VERSION has CHANGELOG entry"

          # Verify no forbidden files on insider
          FORBIDDEN=$(git ls-files | grep -E "^(\.(ai-team|squad|ai-team-templates)/|team-docs/|docs/proposals/)" || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Forbidden files found on insider: $FORBIDDEN"
            exit 1
          fi
          echo "✅ No forbidden files on insider"

      - name: Merge insider → main
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git checkout main
          git merge origin/insider --no-ff -m "chore: promote insider → main (v$(node -e "console.log(require('./package.json').version)"))"
          git push origin main
          echo "✅ Pushed main — squad-release.yml will tag and publish the release"

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."
