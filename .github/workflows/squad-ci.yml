name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clean dist folders
        run: rm -rf packages/*/dist

      - name: Install root and SDK dependencies
        run: npm ci --workspace=packages/squad-sdk

      - name: Build SDK
        run: npm run build --workspace=packages/squad-sdk

      - name: Install CLI dependencies
        run: npm ci --workspace=packages/squad-cli

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build CLI
        run: npm run build --workspace=packages/squad-cli

      - name: Run tests
        run: npm test
