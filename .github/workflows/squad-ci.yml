name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clean dist folders
        run: rm -rf packages/*/dist

      - name: Install dependencies
        run: npm ci

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Debug - List SDK dist contents
        run: ls -la packages/squad-sdk/dist/

      - name: Debug - Check roles exists
        run: test -d packages/squad-sdk/dist/roles && echo "roles dir exists" || echo "roles dir MISSING"

      - name: Debug - List CLI node_modules SDK
        run: ls -la packages/squad-cli/node_modules/@bradygaster/squad-sdk/dist/ || echo "SDK not found in CLI node_modules"

      - name: Run tests
        run: npm test
