# Comment spam auto-moderator
# Detects and minimizes (hides) spam comments from bot/spam accounts on issues and PRs.
# Uses a multi-signal scoring system to minimize false positives.
# Note: This workflow does NOT block users — it only hides comments classified as spam.
# Blocking repeat offenders requires admin privileges and is outside the scope of this action.
# See: docs/proposals/comment-spam-protection.md
# Issue: #751

name: squad-comment-moderation

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  moderate:
    # Skip bot comments to avoid unnecessary runs (e.g. Copilot, Dependabot).
    # Recursion-safe: GITHUB_TOKEN-triggered comments don't fire issue_comment
    # events, so this workflow cannot re-trigger itself.
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout scoring module
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/comment-moderation.mjs
          sparse-checkout-cone-mode: false

      - name: Check comment for spam signals
        uses: actions/github-script@v7
        with:
          script: |
            const {
              shouldSkipComment,
              scoreComment,
              buildModerationNotice,
              SPAM_THRESHOLD,
            } = await import(`${process.env.GITHUB_WORKSPACE}/scripts/comment-moderation.mjs`);

            const comment = context.payload.comment;
            const sender = context.payload.sender;

            // --- Skip trusted / bot authors ---
            if (shouldSkipComment(comment.author_association, sender.type)) {
              console.log(`Skipping: author_association=${comment.author_association}, sender.type=${sender.type}`);
              return;
            }

            // --- Fetch account age (not available in webhook payload) ---
            let userAgeDays = null;
            let userLookupFailed = false;
            try {
              const { data: user } = await github.rest.users.getByUsername({
                username: sender.login,
              });
              userAgeDays = (Date.now() - new Date(user.created_at).getTime()) / (1000 * 60 * 60 * 24);
            } catch (e) {
              userLookupFailed = true;
            }

            // --- Score ---
            const { score, signals } = scoreComment({
              body: comment.body || '',
              authorAssociation: comment.author_association,
              userAgeDays,
              userLookupFailed,
            });

            console.log(`Spam score: ${score}/${SPAM_THRESHOLD} threshold | Signals: ${signals.join(', ') || 'none'}`);

            if (score < SPAM_THRESHOLD) {
              console.log('Below threshold — no action taken.');
              return;
            }

            // --- Act: minimize comment ---
            console.log(`⚠️ Spam detected (score=${score}). Minimizing comment.`);

            try {
              await github.graphql(`
                mutation($id: ID!) {
                  minimizeComment(input: { subjectId: $id, classifier: SPAM }) {
                    minimizedComment { isMinimized }
                  }
                }
              `, { id: comment.node_id });
              console.log('Comment minimized successfully.');
            } catch (e) {
              console.error(`Failed to minimize comment: ${e.message}`);
            }

            // --- Act: post moderation notice ---
            const notice = buildModerationNotice(
              signals,
              context.repo.owner,
              context.repo.repo,
            );

            try {
              const issueNumber = context.payload.issue?.number
                ?? context.payload.pull_request?.number;
              if (issueNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: notice,
                });
              }
              console.log('Moderation notice posted.');
            } catch (e) {
              console.error(`Failed to post notice: ${e.message}`);
            }
