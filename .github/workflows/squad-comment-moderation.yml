# Comment spam auto-moderator
# Detects and minimizes (hides) spam comments from bot/spam accounts on issues and PRs.
# Uses a multi-signal scoring system to minimize false positives.
# Note: This workflow does NOT block users — it only hides comments classified as spam.
# Blocking repeat offenders requires admin privileges and is outside the scope of this action.
# See: docs/proposals/comment-spam-protection.md
# Issue: #751

name: squad-comment-moderation

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  moderate:
    # Skip bot comments to avoid unnecessary runs (e.g. Copilot, Dependabot).
    # Recursion-safe: GITHUB_TOKEN-triggered comments don't fire issue_comment
    # events, so this workflow cannot re-trigger itself.
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout scoring module
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/comment-moderation.mjs
          sparse-checkout-cone-mode: false

      - name: Moderate comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_NODE_ID: ${{ github.event.comment.node_id }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          COMMENT_USER_TYPE: ${{ github.event.comment.user.type }}
          COMMENT_ASSOCIATION: ${{ github.event.comment.author_association }}
          COMMENT_CREATED: ${{ github.event.comment.created_at }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: node scripts/comment-moderation.mjs
