name: Publish Insider to npm

on:
  push:
    branches:
      - insider

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "Retry $i/3 — npm ci failed, retrying in 5s..."
            sleep 5
          done

      - name: Build
        run: npm run build

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "Retry $i/3 — npm ci failed, retrying in 5s..."
            sleep 5
          done

      - name: Run tests
        run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Validate npm token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured — publish will fail"
            exit 1
          fi
          echo "✅ NPM_TOKEN is set"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "Retry $i/3 — npm ci failed, retrying in 5s..."
            sleep 5
          done

      - name: Build packages
        run: npm -w packages/squad-sdk run build && npm -w packages/squad-cli run build

      - name: Publish squad-sdk with insider tag
        run: npm -w packages/squad-sdk publish --tag insider --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish squad-cli with insider tag
        run: npm -w packages/squad-cli publish --tag insider --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
