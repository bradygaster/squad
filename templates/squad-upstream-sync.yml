# Squad Upstream Sync — GitHub Action template
#
# Periodically checks parent Squad repos for changes and opens PRs.
# Generated by: squad upstream watch --auto-pr (GitHub Action mode)
#
# Usage:
#   1. Copy this file to .github/workflows/squad-upstream-sync.yml
#   2. Adjust the cron schedule as needed
#   3. Ensure GITHUB_TOKEN has PR creation permissions
#
# See: https://github.com/bradygaster/squad/issues/357

name: Squad Upstream Sync

on:
  schedule:
    # Run every 6 hours (configurable)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force sync even if no changes detected'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  upstream-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Squad CLI
        run: npm install -g @bradygaster/squad-cli

      - name: Sync upstream sources
        id: sync
        run: |
          squad upstream sync 2>&1 | tee sync-output.txt
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat sync-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet .squad/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No upstream changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Upstream changes detected!"
            git diff --stat .squad/
          fi

      - name: Create sync branch and PR
        if: steps.changes.outputs.has_changes == 'true' || github.event.inputs.force_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="squad/upstream-sync/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git config user.name "squad-bot"
          git config user.email "squad-bot@users.noreply.github.com"
          git add .squad/
          git commit -m "chore: sync upstream Squad sources

          Automated upstream sync by Squad CLI.
          ${{ steps.sync.outputs.output }}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: sync upstream Squad sources" \
            --body "## Upstream Sync

          This PR was automatically created by the Squad upstream sync workflow.

          ### Changes
          ${{ steps.sync.outputs.output }}

          ---
          *Automated by [Squad CLI](https://github.com/bradygaster/squad)*" \
            --base main \
            --head "$BRANCH" \
            --label "squad:upstream-sync"
