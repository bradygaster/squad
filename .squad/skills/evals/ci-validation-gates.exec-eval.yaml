skill: "ci-validation-gates"
description: "Execution evals — verifies that ci-validation-gates produces the correct defensive CI patterns: semver validation, token verification, retry logic, and draft release detection."
cases:
  - id: "ci-validation-gates-exec-01"
    prompt: "Set up a prerelease guard in the publish workflow to prevent invalid version formats from reaching npm."
    skill_context: "full"
    expected_output: "The skill produces a semver validation gate step using npx semver to validate the version string extracted from the release tag. It explicitly rejects 4-part versions (e.g., 0.8.21.4) and exits with a non-zero code on failure."
    assertions:
      - "The response includes a CI step using npx semver to validate the version string"
      - "The response shows stripping the 'v' prefix from the tag name before validation"
      - "The response explicitly states 4-part versions (X.Y.Z.N) are invalid and will cause the step to fail"
      - "The validation step exits with exit 1 on invalid semver"
      - "Does NOT suggest manual version format checks (e.g., regex only) as a substitute for npx semver"
    category: "execution"
    notes: "The semver gate is the first lesson from the v0.8.22 incident. The skill must produce actual YAML with the npx semver command, not just describe the concept."

  - id: "ci-validation-gates-exec-02"
    prompt: "The CI publish job keeps failing with EOTP errors. What's wrong and how do I fix it?"
    skill_context: "full"
    expected_output: "The skill diagnoses the EOTP error as caused by using a User npm token with 2FA enabled instead of an Automation token. It instructs creating an Automation token at npmjs.com → Settings → Access Tokens → Automation and replacing the NPM_TOKEN secret."
    assertions:
      - "The response identifies EOTP errors as caused by a User token with 2FA, not an Automation token"
      - "The response instructs the user to create an Automation token specifically (not a user token)"
      - "The response specifies where to create it: npmjs.com → Settings → Access Tokens → Automation"
      - "Does NOT suggest disabling 2FA as a solution"
      - "Does NOT suggest using a Personal Access Token as a substitute for an Automation token"
    category: "execution"
    notes: "EOTP from User tokens is failure mode #2 from the v0.8.22 incident. The skill must diagnose it correctly and give the right fix."

  - id: "ci-validation-gates-exec-03"
    prompt: "After npm publish succeeds, our verify step immediately returns a 404. Should we just skip verification?"
    skill_context: "full"
    expected_output: "The skill explains that npm registry uses eventual consistency (5-30s propagation, up to 2min), and provides the retry loop pattern: 5 attempts with 15-second intervals, logging each attempt, exiting on success, and failing after max attempts."
    assertions:
      - "The response explicitly rejects skipping verification — verification is mandatory"
      - "The response explains npm registry eventual consistency as the cause of the 404"
      - "The response provides the retry loop: 5 attempts, 15-second wait intervals"
      - "The retry loop logs each attempt (e.g., 'Attempt 1/5: Checking...')"
      - "Does NOT suggest a single-shot verification or skipping verification entirely"
    category: "execution"
    notes: "Single-shot verification after publish is failure mode #3 from the v0.8.22 incident. The skill must produce the full retry loop, not just say 'add retry'."

  - id: "ci-validation-gates-exec-04"
    prompt: "My publish workflow isn't triggering even though I created a GitHub Release. What could be wrong?"
    skill_context: "full"
    expected_output: "The skill identifies the most likely cause: the release was created as a draft. Draft releases emit no event, so the workflow never triggered. The fix is to publish the release (not draft it), and the workflow must trigger on 'release: published', not 'release: created'."
    assertions:
      - "The response identifies the draft release as the most likely cause"
      - "The response explains that draft releases do not emit the release: published event"
      - "The response states the workflow must be configured to trigger on 'release: published' (not 'created')"
      - "Does NOT suggest using workflow_dispatch as the primary fix for a release event trigger problem"
      - "Does NOT suggest the release: created event as equivalent to release: published"
    category: "execution"
    notes: "Draft releases not triggering publish workflows is failure mode #4 from the v0.8.22 incident. Recognition and explanation must be precise."

  - id: "ci-validation-gates-exec-05"
    prompt: "How do I prevent the build script from bumping version numbers during the CI release build?"
    skill_context: "full"
    expected_output: "The skill instructs setting the SKIP_BUILD_BUMP=1 environment variable in all CI release build steps, explaining that bump-build.mjs is for dev builds only and silently mutates versions if allowed to run during release."
    assertions:
      - "The response instructs setting SKIP_BUILD_BUMP=1 as an environment variable in CI steps"
      - "The response explains that bump-build.mjs runs during builds and silently mutates versions"
      - "The response clarifies bump-build.mjs is for dev builds ONLY and must not run during release"
      - "Does NOT suggest modifying bump-build.mjs itself as the solution"
    category: "execution"
    notes: "SKIP_BUILD_BUMP=1 is failure mode #5 from the v0.8.22 incident. The env var name and the reason for it must both be present."
