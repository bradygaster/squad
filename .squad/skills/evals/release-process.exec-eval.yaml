skill: "release-process"
description: "Execution evals — verifies that release-process enforces the correct validation steps, publish commands, and fallback procedures given realistic release scenarios."
cases:
  - id: "release-process-exec-01"
    prompt: "It's time to publish the CLI. Walk me through what needs to happen."
    skill_context: "full"
    expected_output: "The skill produces a pre-publish checklist covering: dependency scan for file:/link: references, CHANGELOG.md updated, version bumps committed, npm auth verified as Automation token, no draft GitHub Releases pending, local build and test passing, and the promotion pipeline (dev → preview → main)."
    assertions:
      - "The response includes a step to scan for file: or link: references in packages/*/package.json"
      - "The response mentions that NPM_TOKEN must be an Automation token (not a user token)"
      - "The response includes at least 5 distinct pre-publish validation steps"
      - "The response references the promotion pipeline: dev → preview → main"
      - "Does NOT instruct the agent to trigger the release directly (Brady owns the release trigger)"
    category: "execution"
    notes: "The most common release scenario. The skill must surface all earned gotchas from the v0.9.1 incident, not just a generic checklist."

  - id: "release-process-exec-02"
    prompt: "Run: npm -w packages/squad-cli publish"
    skill_context: "full"
    expected_output: "The skill warns that npm -w publish hangs silently when 2FA is enabled and provides the correct alternative: cd into the package directory and run npm publish --access public."
    assertions:
      - "The response explicitly warns against using npm -w for publishing"
      - "The response explains the specific failure mode: silent hang when 2FA is enabled"
      - "The correct alternative command is provided: cd packages/squad-cli && npm publish --access public"
      - "Does NOT suggest that npm -w is acceptable with any workaround"
    category: "execution"
    notes: "This is the exact command pattern that caused the v0.9.1 incident. The skill must recognize it and warn, not silently proceed."

  - id: "release-process-exec-03"
    prompt: "The npm publish workflow failed. What do we do now?"
    skill_context: "full"
    expected_output: "The skill describes the fallback protocol: try once more (ONE retry), then if it fails again switch to local publish immediately. It warns against attempting GitHub UI file operations and explains the ~15min workflow cache TTL."
    assertions:
      - "The response specifies exactly ONE retry attempt before switching to fallback"
      - "The response recommends local publish as the fallback (cd into package dir, npm publish)"
      - "The response warns against GitHub UI file operations to fix workflow indexing"
      - "The response mentions the ~15min GitHub Actions workflow cache TTL as the reason waiting helps"
      - "Does NOT suggest retrying four or more times before switching strategies"
    category: "execution"
    notes: "The fallback protocol is precise: one retry, then local. The skill must not suggest repeated retries which waste time and were explicitly ruled out after the v0.9.1 incident."

  - id: "release-process-exec-04"
    prompt: "Should I create a draft GitHub Release first so I can preview it?"
    skill_context: "full"
    expected_output: "The skill refuses the draft approach and explains that draft GitHub Releases do not emit the release: published event, which means the npm publish workflow will never trigger."
    assertions:
      - "The response explicitly advises against creating draft GitHub Releases"
      - "The response explains that the release: published event only fires when a release is published, not when it is drafted"
      - "The response states this will prevent the npm publish workflow from triggering"
      - "Does NOT suggest a workaround that still uses draft releases"
    category: "execution"
    notes: "Draft releases are a non-obvious failure mode. The skill must proactively block this approach, not just warn."

  - id: "release-process-exec-05"
    prompt: "The smoke test after publish shows squad --version returns the old version number."
    skill_context: "full"
    expected_output: "The skill identifies this as a failed smoke test and instructs an immediate rollback. It describes the post-publish smoke test steps and explains how to verify the published version in a clean shell."
    assertions:
      - "The response identifies the smoke test failure and states rollback should happen immediately"
      - "The response includes the post-publish verification commands: npm install -g @bradygaster/squad-cli@latest, squad --version, squad doctor"
      - "The response describes at least one concrete rollback action"
      - "Does NOT suggest the wrong version is acceptable or could be ignored"
    category: "execution"
    notes: "Post-publish smoke tests are a mandatory gate. The skill must know what the smoke test looks like and that failure triggers immediate rollback."
