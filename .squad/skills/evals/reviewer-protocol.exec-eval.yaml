skill: "reviewer-protocol"
description: "Execution evals — verifies that reviewer-protocol enforces strict lockout semantics, prevents self-revision, and handles deadlock correctly."
cases:
  - id: "reviewer-protocol-exec-01"
    prompt: "FIDO (Tester) just rejected EECOM's authentication module PR with the comment: 'Error handling is missing.' Who should fix it?"
    skill_context: "full"
    expected_output: "The skill enforces strict lockout: EECOM (the original author) is locked out of this artifact and may not revise it. A different agent must be assigned. The Coordinator must select a revision author who is not EECOM."
    assertions:
      - "The response explicitly states EECOM is locked out as the original author"
      - "The response states a different agent must own the revision — not EECOM"
      - "The response explains the Coordinator must verify the selected revision agent is NOT the original author before spawning"
      - "Does NOT suggest EECOM can self-revise, even as an advisor or co-author"
      - "Does NOT clear the lockout before the revision is approved"
    category: "execution"
    notes: "Lockout on rejection is the core rule. No exceptions, no advisory roles for the original author."

  - id: "reviewer-protocol-exec-02"
    prompt: "Three agents have each tried to fix the module and FIDO rejected all three versions. What happens next?"
    skill_context: "full"
    expected_output: "The skill recognizes a deadlock: all eligible agents are locked out. The Coordinator must escalate to the user rather than re-admitting any locked-out author. The response should include the escalation message format."
    assertions:
      - "The response identifies this as a deadlock scenario"
      - "The response states the Coordinator must escalate to the user"
      - "The response indicates that no locked-out author may be re-admitted even under deadlock"
      - "The response includes or describes the escalation message: 'All eligible agents have been locked out. Escalating to user: [artifact details]'"
      - "Does NOT suggest admitting any previously locked-out agent back to fix the module"
    category: "execution"
    notes: "Deadlock handling is explicit in the skill: escalate to user, never re-admit. This tests the edge case most likely to be mishandled."

  - id: "reviewer-protocol-exec-03"
    prompt: "FIDO rejected the config module. The reviewer then said 'EECOM should fix the error handling since they wrote it.' What should the Coordinator do?"
    skill_context: "full"
    expected_output: "The Coordinator must refuse FIDO's assignment because EECOM is the locked-out original author. The Coordinator asks FIDO to name a different agent."
    assertions:
      - "The response states the Coordinator must refuse the assignment of EECOM"
      - "The response provides the Coordinator's refusal message: 'EECOM is locked out as the original author. Please name a different agent.'"
      - "The response explains the Coordinator mechanically verifies the revision agent is not the original author before spawning"
      - "Does NOT allow EECOM to be assigned even when the reviewer explicitly names them"
    category: "execution"
    notes: "The Coordinator must override even the Reviewer's explicit assignment if it names the original author. This is a rule, not a suggestion."

  - id: "reviewer-protocol-exec-04"
    prompt: "FIDO approved the revised config module. Is EECOM's lockout cleared?"
    skill_context: "full"
    expected_output: "The skill states that the lockout is cleared for that specific artifact after approval of the revision. The lockout was scoped to this artifact's revision cycle; EECOM is free to work on other unrelated artifacts and on this one going forward."
    assertions:
      - "The response states the lockout clears after the revision is approved"
      - "The response clarifies that lockout scope is per-artifact (not global)"
      - "The response confirms EECOM may work on unrelated artifacts even while locked out from this one"
      - "Does NOT extend the lockout indefinitely after approval"
    category: "execution"
    notes: "Lockout scope is per-artifact and per-revision-cycle. Understanding the clearing condition is as important as understanding the lockout trigger."
