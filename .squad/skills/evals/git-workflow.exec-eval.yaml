skill: "git-workflow"
description: "Execution evals — verifies that git-workflow enforces the correct branching model, PR targets, and insiders flow given realistic developer scenarios."
cases:
  - id: "git-workflow-exec-01"
    prompt: "I need to start working on issue #214. Where should I branch from?"
    skill_context: "full"
    expected_output: "The skill instructs the developer to branch from dev (not main), using the squad/{issue-number}-{slug} naming convention, and provides the exact git commands to do so."
    assertions:
      - "The response explicitly states the branch must come from dev, not main"
      - "The response provides the branch naming pattern: squad/214-{kebab-case-slug}"
      - "The response includes git commands: git checkout dev, git pull origin dev, git checkout -b squad/214-{slug}"
      - "Does NOT suggest branching from main"
    category: "execution"
    notes: "Branching from main is the #1 anti-pattern. The skill must be unambiguous that dev is the source branch."

  - id: "git-workflow-exec-02"
    prompt: "I just opened a PR targeting main with my feature branch. Is that OK?"
    skill_context: "full"
    expected_output: "The skill redirects the PR target to dev, explains that all feature work must land in dev first, and provides the gh pr edit command to change the base branch."
    assertions:
      - "The response states the PR target must be changed from main to dev"
      - "The response explains that feature work never goes directly to main"
      - "The response provides the command to update the base branch (gh pr edit --base dev)"
      - "Does NOT say a PR to main is acceptable under any normal feature workflow condition"
    category: "execution"
    notes: "PRs targeting main are a critical workflow violation. The skill must actively redirect, not just note the preference."

  - id: "git-workflow-exec-03"
    prompt: "How do I create an insiders build so early adopters can test my feature?"
    skill_context: "full"
    expected_output: "The skill describes the insiders flow: work lands in dev first via a normal PR, then the insiders branch is synced from dev automatically on a green build. It publishes with the --tag insiders npm tag."
    assertions:
      - "The response explains that insiders is synced from dev (not pushed to directly)"
      - "The response mentions the npm publish --tag insiders step that occurs on sync"
      - "The response clarifies the order: feature PR → dev → automated insiders sync"
      - "Does NOT instruct the developer to push directly to the insiders branch"
    category: "execution"
    notes: "Developers often try to push directly to insiders. The skill must describe the automated sync model."

  - id: "git-workflow-exec-04"
    prompt: "I need to work on issues #301 and #302 at the same time in the same repo."
    skill_context: "full"
    expected_output: "The skill recommends using git worktrees to give each issue an isolated working directory, provides the worktree setup commands branching from dev, and uses the naming convention ../repo-{issue-number}."
    assertions:
      - "The response recommends git worktree for parallel multi-issue work in the same repo"
      - "The response provides the worktree add commands, each branching from origin/dev"
      - "The worktree naming follows the pattern: ../{repo-name}-{issue-number}"
      - "Does NOT suggest switching branches in the main clone while worktrees are active"
      - "Does NOT suggest creating separate clones for parallel issues in the same repo (that is for multi-repo work)"
    category: "execution"
    notes: "Worktrees are the correct tool for parallel single-repo work. The skill must distinguish this from the multi-repo clone scenario."
