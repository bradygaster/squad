skill: "gh-auth-isolation"
description: "Execution evals — verifies that gh-auth-isolation describes the correct token extraction and push technique for personal repos, and warns about multi-agent auth switching risks."
cases:
  - id: "gh-auth-isolation-exec-01"
    prompt: "I need to push my changes to my personal GitHub repo (personaluser/my-blog) but my shell is logged in with my EMU corporate account."
    skill_context: "full"
    expected_output: "The skill describes extracting the personal account token using 'gh auth token --user personaluser' and using it inline for a single HTTPS push without persisting it. It also reminds to clean up the remote URL after the push."
    assertions:
      - "The response includes the command: gh auth token --user personaluser"
      - "The response shows the push using token-authenticated HTTPS: git push https://personaluser:$token@github.com/personaluser/my-blog.git"
      - "The response includes a cleanup step to reset the remote URL after pushing (to avoid persisting the token in the remote)"
      - "Does NOT suggest running gh auth login or gh auth switch to change the global default"
      - "Does NOT suggest hardcoding the token in a script or environment variable"
    category: "execution"
    notes: "The token-extraction pattern is the safe, non-destructive approach. Switching global auth breaks parallel agents."

  - id: "gh-auth-isolation-exec-02"
    prompt: "Can I just run 'gh auth switch' to change from my EMU account to my personal account for this operation?"
    skill_context: "full"
    expected_output: "The skill warns against gh auth switch in multi-agent sessions because switching the global default affects all concurrent agents sharing the shell. It describes the token extraction method as the safe alternative."
    assertions:
      - "The response explicitly warns against using gh auth switch in multi-agent or shared-shell scenarios"
      - "The response explains that gh auth switch changes the default for ALL processes sharing the shell"
      - "The response describes the safe alternative: gh auth token --user to extract a specific account's token without changing the global default"
      - "Does NOT recommend gh auth switch as an acceptable approach in any multi-agent context"
    category: "execution"
    notes: "gh auth switch is the main anti-pattern. Agents often suggest it innocently, but it has global side effects."

  - id: "gh-auth-isolation-exec-03"
    prompt: "How do I create a PR from my personal fork (personaluser/squad) to the upstream repo (bradygaster/squad) when my default gh auth is my EMU account?"
    skill_context: "full"
    expected_output: "The skill describes two safe options: using gh pr create with the --repo flag and the personal token set via GH_TOKEN env var for a single command, or using the --head personaluser:branch flag. It also shows how to clean up GH_TOKEN after the command."
    assertions:
      - "The response shows at least one of the two correct approaches: --repo flag or temporary GH_TOKEN env var"
      - "The response includes the GH_TOKEN cleanup step (Remove-Item Env:\\GH_TOKEN or unset GH_TOKEN)"
      - "The response shows the correct PR command targeting the upstream repo with the personal fork's branch as the head"
      - "Does NOT suggest storing the personal token in .env or .squad/ files"
    category: "execution"
    notes: "Cross-fork PRs with mismatched auth contexts are a common pain point. The skill must show a concrete, safe command sequence."

  - id: "gh-auth-isolation-exec-04"
    prompt: "For advanced isolation, how can I set up completely separate gh config directories for my two accounts?"
    skill_context: "full"
    expected_output: "The skill describes using GH_CONFIG_DIR to point to separate config directories (e.g., ~/.config/gh-public for personal), running gh auth login in each context, and using shell aliases (ghp/ghe) for quick switching."
    assertions:
      - "The response mentions the GH_CONFIG_DIR environment variable as the mechanism for config directory isolation"
      - "The response provides the one-time setup: mkdir ~/.config/gh-public and gh auth login with GH_CONFIG_DIR set"
      - "The response shows shell alias patterns (ghp for personal, ghe for EMU)"
      - "Does NOT suggest this approach for casual use — it should be framed as an advanced/one-time setup"
    category: "execution"
    notes: "Config directory isolation is the power-user pattern for complete account separation. The skill must describe both the setup and usage correctly."
