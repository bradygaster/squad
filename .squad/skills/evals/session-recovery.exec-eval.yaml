skill: "session-recovery"
description: "Execution evals — verifies that session-recovery produces correct SQL queries against session_store and follows the correct recovery workflow for interrupted sessions."
cases:
  - id: "session-recovery-exec-01"
    prompt: "My terminal crashed while I was in the middle of creating a PR for issue #214. How do I recover?"
    skill_context: "full"
    expected_output: "The skill describes querying session_store for recent sessions filtered by branch name or issue reference, checking the last checkpoint to determine how far the session got (was code committed? was PR created?), and then using copilot --resume SESSION_ID to resume."
    assertions:
      - "The response includes a SQL query against the sessions or session_refs table filtered by recent time window (e.g., '-24 hours')"
      - "The response shows filtering for sessions that referenced issue #214 (via session_refs where ref_type = 'issue' and ref_value = '214')"
      - "The response includes a checkpoint query to determine where the session stopped"
      - "The response mentions copilot --resume SESSION_ID as the resume mechanism"
      - "Does NOT suggest re-doing all the work from scratch without first checking session_store"
    category: "execution"
    notes: "Crash recovery via session_store is the core use case. The skill must produce real, runnable SQL — not just describe the concept."

  - id: "session-recovery-exec-02"
    prompt: "Find the work I was doing yesterday afternoon on the authentication feature."
    skill_context: "full"
    expected_output: "The skill produces a time-windowed FTS5 search query against search_index using keywords expanded with synonyms (auth, login, token, JWT), combined with a datetime filter for the relevant time window, and excludes automated sessions (heartbeat, keep-alive)."
    assertions:
      - "The response includes a SQL query using the search_index FTS5 table with MATCH syntax"
      - "The query uses keyword expansion with synonyms: 'auth OR login OR token OR JWT OR session OR authentication'"
      - "The query filters by time window using datetime('now', '-48 hours') or similar"
      - "The response mentions filtering out automated sessions (keep-alive, heartbeat) to reduce noise"
      - "Does NOT use semantic search descriptions — clarifies this is keyword-based FTS5 and must expand synonyms"
    category: "execution"
    notes: "FTS5 is keyword-based, not semantic. The skill must describe query expansion and the automated-session filter — two common mistakes are assuming semantic search and being flooded by heartbeat sessions."

  - id: "session-recovery-exec-03"
    prompt: "I found the session ID. Now show me everything that session was working on."
    skill_context: "full"
    expected_output: "The skill produces all four context queries: conversation turns (turns table), checkpoint progress (checkpoints table), files touched (session_files table), and linked PRs/issues/commits (session_refs table)."
    assertions:
      - "The response includes a query against the turns table to retrieve conversation turns for the session"
      - "The response includes a query against the checkpoints table to show checkpoint progress"
      - "The response includes a query against the session_files table to show files touched"
      - "The response includes a query against the session_refs table to show linked PRs, issues, and commits"
    category: "execution"
    notes: "Before resuming, all four context tables should be queried to fully reconstruct what the session was doing. Missing any of them leaves gaps in recovery."

  - id: "session-recovery-exec-04"
    prompt: "Find all sessions that were working on in-progress issues but may have been abandoned."
    skill_context: "full"
    expected_output: "The skill produces a SQL query joining sessions and session_refs filtered by ref_type='issue' and a recent time window, and recommends cross-referencing with 'gh issue list --label status:in-progress' to find issues marked in-progress with no active session."
    assertions:
      - "The response includes a SQL query joining sessions and session_refs where ref_type = 'issue'"
      - "The response filters by a time window (e.g., '-48 hours') to find recently abandoned sessions"
      - "The response recommends cross-referencing with gh issue list --label 'status:in-progress'"
      - "Does NOT search only session summaries without joining session_refs (which has the issue links)"
    category: "execution"
    notes: "Orphaned issue detection requires both the SQL query and the gh issue list cross-reference. Either alone is incomplete."
