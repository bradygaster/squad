skill: "model-selection"
description: "Execution evals — verifies that model-selection resolves the correct model given task type, persistent config, session directives, and economy overrides."
cases:
  - id: "model-selection-exec-01"
    prompt: "Spawn an agent to implement the OAuth2 login flow in src/auth.ts"
    skill_context: "full"
    expected_output: "The skill resolves claude-sonnet-4.6 (or a standard-tier equivalent) as the model for a code implementation task, and includes it in the spawn acknowledgment using the 🔧 format."
    assertions:
      - "The resolved model is a standard-tier or premium-tier model (e.g., claude-sonnet-4.6, gpt-5.4) — NOT claude-haiku-4.5 or a fast-tier model"
      - "The response references Layer 3 Task-Aware Auto-Selection as the resolution source"
      - "The spawn acknowledgment follows the format: 🔧 {Name} ({resolved_model}) — {task}"
      - "Does NOT resolve to claude-haiku-4.5 for a code implementation task"
    category: "execution"
    notes: "Code tasks must land on sonnet-tier (Layer 3), not haiku. This is the most common resolution path."

  - id: "model-selection-exec-02"
    prompt: "Spawn an agent to update the CHANGELOG.md and write release notes for v1.2.0"
    skill_context: "full"
    expected_output: "The skill resolves claude-haiku-4.5 (or a fast-tier equivalent) as the model for a non-code documentation task, and includes it in the spawn acknowledgment."
    assertions:
      - "The resolved model is a fast-tier model (e.g., claude-haiku-4.5, gpt-4.1) appropriate for docs/planning tasks"
      - "The response references Layer 3 Task-Aware Auto-Selection as the resolution source"
      - "The spawn acknowledgment includes the resolved model name"
      - "Does NOT resolve to claude-sonnet-4.6 or claude-opus-4.6 for a pure documentation task"
    category: "execution"
    notes: "Docs and changelog tasks should use the fast tier — spawning sonnet for changelog writing is cost-wasteful and violates the selection hierarchy."

  - id: "model-selection-exec-03"
    prompt: "Always use opus for everything from now on"
    skill_context: "full"
    expected_output: "The skill saves defaultModel as claude-opus-4.6 to .squad/config.json (Layer 0b) and acknowledges that all future sessions will use this model. It references Layer 0 persistent config and explains it overrides all lower layers."
    assertions:
      - "The response mentions writing to .squad/config.json with the field defaultModel"
      - "The response names claude-opus-4.6 as the saved model"
      - "The acknowledgment message matches or closely follows: '✅ Model preference saved: claude-opus-4.6 — all future sessions will use this until changed'"
      - "The response explains Layer 0 (persistent config) beats all other layers including Layer 3 task-aware selection"
      - "Does NOT suggest the preference is session-only"
    category: "execution"
    notes: "Persistent model preferences must be written to config.json and survive sessions. The skill must correctly identify this as a Layer 0b operation."

  - id: "model-selection-exec-04"
    prompt: "Economy mode is active. Spawn an agent to write unit tests for the payment module."
    skill_context: "full"
    expected_output: "With economy mode active, the skill applies the economy Layer 3 table and resolves a cost-optimized model (e.g., gpt-4.1 or gpt-5-mini) instead of claude-sonnet-4.6, and includes the 💰 indicator in the spawn acknowledgment."
    assertions:
      - "The resolved model is a cost-optimized model such as gpt-4.1 or gpt-5-mini — NOT claude-sonnet-4.6"
      - "The spawn acknowledgment includes the 💰 economy indicator"
      - "The response explains that economy mode shifts Layer 3 auto-selection to cheaper alternatives"
      - "Does NOT override a Layer 0 defaultModel or Layer 2 charter preference if one were set"
      - "Does NOT resolve to a premium-tier model (claude-opus) via economy mode"
    category: "execution"
    notes: "Economy mode only shifts Layer 3. The skill must use the economy table and include the 💰 indicator. This tests interaction between economy-mode and model-selection skills."
