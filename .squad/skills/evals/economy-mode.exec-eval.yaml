skill: "economy-mode"
description: "Execution evals — verifies that economy-mode correctly activates, applies the economy model table at Layer 3, includes the 💰 indicator, and does not override Layer 0 or Layer 2 preferences."
cases:
  - id: "economy-mode-exec-01"
    prompt: "Go cheap — I don't want to burn tokens on expensive models today."
    skill_context: "full"
    expected_output: "The skill activates economy mode for the session (not persistent), acknowledges with the standard message including '(Layer 0 and Layer 2 preferences still apply)', and will apply the economy model table at Layer 3 for subsequent spawns."
    assertions:
      - "The response acknowledges economy mode activation with the message: '✅ Economy mode active — using cost-optimized models this session. (Layer 0 and Layer 2 preferences still apply)'"
      - "The response indicates this is session-only (not saved to config.json) since no 'always' or persistence keyword was used"
      - "The response explains that Layer 0 (defaultModel, agentModelOverrides) and Layer 2 (charter preferences) are not affected"
      - "Does NOT write economyMode: true to .squad/config.json for a session-only activation phrase"
    category: "execution"
    notes: "Session-only activation must not persist to config.json. The acknowledgment message is specified exactly in the skill."

  - id: "economy-mode-exec-02"
    prompt: "Save costs on this batch — always use economy mode from now on."
    skill_context: "full"
    expected_output: "The skill activates economy mode persistently by writing economyMode: true to .squad/config.json and acknowledges with the persistent-save message."
    assertions:
      - "The response writes economyMode: true to .squad/config.json"
      - "The response acknowledges with: '✅ Economy mode saved — cost-optimized models will be used until disabled.'"
      - "The response merges the new field into config.json without overwriting other fields (e.g., defaultModel, agentModelOverrides)"
      - "Does NOT activate only for the current session when 'always' or a persistence keyword is present"
    category: "execution"
    notes: "Persistent activation requires the config.json write. The merge-don't-overwrite rule is critical — other config fields must survive."

  - id: "economy-mode-exec-03"
    prompt: "Economy mode is active. Spawn an agent to review the authentication module for security vulnerabilities."
    skill_context: "full"
    expected_output: "The skill applies the economy table for an architecture/security review task: resolves claude-sonnet-4.5 (not haiku or gpt-5-mini), includes the 💰 indicator in the spawn acknowledgment, and explains that security reviews only shift from opus to sonnet — they do NOT go to fast/cheap models."
    assertions:
      - "The resolved model is claude-sonnet-4.5 for a security review task in economy mode"
      - "The spawn acknowledgment includes the 💰 indicator"
      - "The response explains that architecture and security tasks shift from claude-opus to claude-sonnet in economy mode — not to gpt-4.1 or gpt-5-mini"
      - "Does NOT resolve to gpt-4.1 or gpt-5-mini for a security audit task"
      - "Does NOT bump up to a premium model (claude-opus) via economy mode"
    category: "execution"
    notes: "The economy table has nuance: security/architecture tasks go sonnet (not fast tier). This is the most commonly misapplied case."

  - id: "economy-mode-exec-04"
    prompt: "Economy mode is active, but I also set defaultModel: claude-opus-4.6 in config.json. Which model wins?"
    skill_context: "full"
    expected_output: "The skill correctly resolves Layer 0b (defaultModel in config.json) as the winner. Economy mode only affects Layer 3, and Layer 0 always beats Layer 3. Every agent gets claude-opus-4.6 regardless of economy mode."
    assertions:
      - "The response states that defaultModel: claude-opus-4.6 (Layer 0b) wins over economy mode"
      - "The response explains that economy mode only shifts Layer 3 auto-selection and does not override Layer 0"
      - "The response confirms all agents will use claude-opus-4.6 as configured, even with economy mode active"
      - "Does NOT resolve to a cheaper model when Layer 0 is explicitly set"
    category: "execution"
    notes: "Layer 0 always wins — this is the fundamental rule of the model resolution hierarchy. Economy mode must not override explicit user intent from Layer 0."

  - id: "economy-mode-exec-05"
    prompt: "Turn off economy mode."
    skill_context: "full"
    expected_output: "The skill deactivates economy mode: removes economyMode from .squad/config.json (if it was persisted), clears the session state, and acknowledges with the standard deactivation message."
    assertions:
      - "The response acknowledges with: '✅ Economy mode disabled — returning to standard model selection.'"
      - "The response removes economyMode from .squad/config.json if it was saved there"
      - "The response clears the session economy mode state"
      - "Does NOT leave economy mode active for in-flight agent spawns after deactivation"
    category: "execution"
    notes: "Deactivation must clean up both the config.json field and the session state. The acknowledgment message is specified exactly in the skill."
