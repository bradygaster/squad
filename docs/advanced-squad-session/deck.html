{eye:'Advanced Squad Patterns',title:'Start with the real problem: context is finite',body:html`<div class="grid wide"><div><p class="takeaway">The architecture question is not "can agents remember?" It is "what should enter context, when, and with what authority?"</p><br><p>Squad is useful only if memory improves future work without consuming the entire prompt, polluting PRs, or silently turning stale notes into policy.</p><br><div class="badges"><span class="badge green">problem-first</span><span class="badge">source-backed</span><span class="badge">real command output</span><span class="badge red">no fake provider claims</span></div></div><div class="card"><h3>Audience promise</h3><ul><li>Context pressure math.</li><li>Memory layers and lifecycle.</li><li>Two-layer backend internals.</li><li>Real git notes/orphan proof.</li><li>Presets, delegation, squads spawning squads.</li></ul></div></div>`,foot:'Thesis: memory is runtime architecture, not a feature checkbox'},

{eye:'Evidence anchor',title:'Issue #1037: state bloat becomes mandatory context tax',body:html`<div class="grid sixty"><div><table><tr><th>File class</th><th>Typical size</th><th>Tokens</th></tr><tr><td>decisions-archive.md</td><td>500KB - 1.6MB</td><td>150K-478K</td></tr><tr><td>decisions.md active</td><td>200KB - 500KB</td><td>60K-143K</td></tr><tr><td>3-5 agent histories</td><td>400KB - 800KB</td><td>115K-230K</td></tr><tr><td>routing + board state</td><td>100KB - 200KB</td><td>30K-53K</td></tr><tr><td><strong>Total mandatory context</strong></td><td><strong>1.2 - 3.1MB</strong></td><td><strong>355K-561K</strong></td></tr></table></div><div><p class="quote">"Your agents aren't getting dumber. They're getting fuller."</p><br><p>Most model windows are finite. Every token spent loading old memory is a token not available for source, tool output, reasoning, or the user's current problem.</p></div></div>`,foot:'Open: outputs/15-context-budget-issue-1037.md or https://github.com/bradygaster/squad/issues/1037'},

{eye:'Mental model',title:'Memory loading is a query plan',body:html`<div class="flow"><span class="node">Task</span><span class="arrow">→</span><span class="node">route</span><span class="arrow">→</span><span class="node">choose surfaces</span><span class="arrow">→</span><span class="node">load only relevant state</span><span class="arrow">→</span><span class="node good">do work</span><span class="arrow">→</span><span class="node">write classified memory</span></div><br><div class="grid three"><div class="card"><h3>Bad query plan</h3><p>Load every decision, every history, every log, every note, every prompt reference, every time.</p></div><div class="card"><h3>Good query plan</h3><p>Always load small invariants; load domain state on demand; keep archives searchable but out of mandatory context.</p></div><div class="card"><h3>Architectural goal</h3><p>Memory becomes an indexed, governed surface; not a junk drawer appended to the system prompt.</p></div></div>`,foot:'Source: issue #1037 and Tamir Part 13 agent-memory blog'},

{eye:'Layer map',title:'Squad has multiple memory surfaces, not one memory bucket',body:html`<table><tr><th>Surface</th><th>Scope</th><th>Load rule</th><th>Proof path</th></tr><tr><td>Static team config</td><td>team/routing/charters</td><td>small core + targeted reads</td><td><code>.squad/team.md</code>, <code>routing.md</code></td></tr><tr><td>Decisions</td><td>shared team truth</td><td>lean active set, archive old</td><td><code>decisions.md</code>, inbox</td></tr><tr><td>Agent histories</td><td>role-local memory</td><td>owning agent only</td><td><code>agents/{name}/history.md</code></td></tr><tr><td>Skills</td><td>portable procedure</td><td>triggered by domain</td><td><code>skills/*/SKILL.md</code></td></tr><tr><td>Governed memory</td><td>typed memory entries</td><td>class + load guidance</td><td><code>memory index</code>, audit JSONL</td></tr><tr><td>Git notes</td><td>commit-scoped why</td><td>inspect/promote after merge</td><td><code>refs/notes/*</code></td></tr><tr><td>Orphan branch</td><td>durable mutable state</td><td>backend read/write</td><td><code>squad-state</code></td></tr></table>`,foot:'The deck will walk from context pressure to these surfaces and their lifecycles'},

{eye:'State pressure',title:'State and code are different workflows',body:html`<div class="grid"><div class="card"><h3>Code</h3><p>Slow, human-reviewed, branch-protected, PR-visible. Reviewers care about product behavior, tests, docs, release notes.</p></div><div class="card"><h3>Squad state</h3><p>Fast, append-heavy, agent-readable, often not for human PR review. Decisions, histories, logs, retrospectives.</p></div></div><br><p class="quote">Part 7 problem: 97 files changed, 40 squad files. The reviewer saw the essay plus the team's private notes.</p>`,foot:'Sources: Tamir Part 7 enterprise-state blog and Part 7b git-notes blog'},

{eye:'Two-layer thesis',title:'Two-layer splits "why on this commit" from durable state',body:html`<svg class="diagram" viewBox="0 0 1060 420"><rect x="50" y="50" width="300" height="110" rx="18" fill="#10213c" stroke="#38bdf8"/><text x="80" y="92" fill="#f8fafc" font-size="23" font-weight="700">Main code branch</text><text x="80" y="125" fill="#cbd5e1" font-size="16">code, tests, static config</text><text x="80" y="148" fill="#cbd5e1" font-size="16">clean PR diff</text><rect x="400" y="45" width="270" height="125" rx="18" fill="#111827" stroke="#fbbf24"/><text x="430" y="88" fill="#f8fafc" font-size="23" font-weight="700">Git notes layer</text><text x="430" y="122" fill="#cbd5e1" font-size="16">commit-scoped why</text><text x="430" y="146" fill="#cbd5e1" font-size="16">invisible in PR diff</text><rect x="720" y="50" width="290" height="110" rx="18" fill="#10213c" stroke="#34d399"/><text x="750" y="92" fill="#f8fafc" font-size="23" font-weight="700">squad-state branch</text><text x="750" y="125" fill="#cbd5e1" font-size="16">durable mutable state</text><text x="750" y="148" fill="#cbd5e1" font-size="16">decisions, history, logs</text><path d="M350 105 H400" stroke="#94a3b8" stroke-width="4"/><path d="M670 105 H720" stroke="#94a3b8" stroke-width="4"/><rect x="200" y="245" width="660" height="92" rx="18" fill="#0f2338" stroke="#a78bfa"/><text x="235" y="286" fill="#f8fafc" font-size="23" font-weight="700">Promotion rule</text><text x="235" y="318" fill="#cbd5e1" font-size="17">merged + promote_to_permanent → durable state; rejected/unflagged → stays commit-scoped or dies with branch</text></svg>`,foot:'Source: PR #1004, state-backend.ts, Tamir Part 7b'},

{eye:'Context reduction beyond memory',title:'Split the coordinator prompt: core inline, references lazy-loaded',body:html`<div class="grid sixty"><div><p class="quote">Issue #1036 framed the problem: <code>squad.agent.md</code> was ~95k characters and loaded into every session's system prompt.</p><br><p>PR #1035 turns that into architecture: keep critical dispatcher rules inline, move ceremonies, PRD intake, issue lifecycle, Ralph, MCP, marketplace, and artifact formats to on-demand reference files.</p></div><div class="card"><h3>Measured direction</h3><p>Flight found the implementation reduced the coordinator file from roughly 95.8KB to roughly 55KB, with references loaded only when triggered.</p><br><p class="source">Open: outputs/16-split-agent-issue-1036.md and outputs/19-context-slimming-pr-1035.md</p></div></div>`,foot:'This is prompt architecture as runtime architecture'},

{eye:'Squads spawning squads',title:'Scale by partitioning work into more teams, not one giant context',body:html`<div class="grid"><div class="card"><h3>HQ pattern</h3><p>An HQ squad receives a mission, creates an isolated child squad, runs it, collects evidence, and synthesizes a verdict.</p></div><div class="card"><h3>Real shipped adjacent proof</h3><p>PR #1022 adds an E2E template-testing skill: disposable repo, <code>squad init</code>, real Copilot session, git-state verification.</p></div><div class="card"><h3>Many feedback personas</h3><p>Platform, frontend, docs, security, and customer-success squads can act as independent user cohorts.</p></div><div class="card"><h3>Guardrail</h3><p>Each spawned squad gets its own context, mission contract, evidence directory, verdict, and depth limit.</p></div></div>`,foot:'Sources: Tamir Part 12 fanout-squads, PR #1022, e2e-template-testing skill'},

{eye:'E2E feedback pattern',title:'Use squads as synthetic user teams with evidence contracts',body:html`<div class="flow"><span class="node">Product squad ships demo</span><span class="arrow">→</span><span class="node">spawn feedback squads</span><span class="arrow">→</span><span class="node">each squad acts as user/team</span><span class="arrow">→</span><span class="node">feedback via issues</span><span class="arrow">→</span><span class="node good">origin squad triages</span></div><br><table><tr><th>Feedback squad</th><th>Role in test</th><th>Evidence to require</th></tr><tr><td>Platform squad</td><td>API/ops review</td><td>endpoint findings, logs, perf deltas</td></tr><tr><td>Frontend squad</td><td>UX journey</td><td>screenshots, reproduction steps</td></tr><tr><td>Security squad</td><td>abuse-path review</td><td>threat notes, blocked exploit claims</td></tr><tr><td>Docs squad</td><td>onboarding user</td><td>missing concepts, ambiguous steps</td></tr></table>`,foot:'Source: Tamir Part 11 Holodeck testing + e2e-template-testing skill'},

{eye:'What architects should take away',title:'The pattern is memory governance under bounded context',body:html`<div class="grid"><div class="card"><h3>1. Treat context as a scarce resource</h3><p>Every loaded file competes with the actual task.</p></div><div class="card"><h3>2. Classify before storing</h3><p>Memory needs type, lifecycle, load guidance, and audit.</p></div><div class="card"><h3>3. Split state by workflow</h3><p>Code PRs and agent memory have different rates and reviewers.</p></div><div class="card"><h3>4. Delegate by contract</h3><p>Use manifests/issues, not shared internals or remote shell fantasies.</p></div></div><br><p class="takeaway">The reusable architecture is: bounded context, typed memory, two-layer state, lazy prompt references, presets for reusable team shapes, and cross-squad contracts for scale.</p>`,foot:'Close with the real artifacts: issue #1037, PR #1145, PR #1004, two-layer transcript'}
];
const main=document.querySelector('main');
main.innerHTML=slideData.map((s,i)=>`<section class="slide ${i===0?'active':''} ${s.klass||''}"><div class="eyebrow">${s.eye}</div><h2>${s.title}</h2>${s.body}<div class="footer"><span>${s.foot}</span><span>${i+1} / ${slideData.length}</span></div></section>`).join('');
const slides=Array.from(document.querySelectorAll('.slide'));let index=0;const progress=document.getElementById('progress');
function show(next){index=Math.max(0,Math.min(slides.length-1,next));slides.forEach((slide,i)=>slide.classList.toggle('active',i===index));progress.style.width=`${((index+1)/slides.length)*100}%`;window.location.hash=`slide-${index+1}`}
function fromHash(){const match=window.location.hash.match(/slide-(\d+)/);if(match)show(Number(match[1])-1)}
document.addEventListener('keydown',event=>{if(event.key==='ArrowRight'||event.key===' ')show(index+1);if(event.key==='ArrowLeft')show(index-1);if(event.key.toLowerCase()==='p')window.print()});window.addEventListener('hashchange',fromHash);fromHash();show(index);
</script></body></html>
